<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ບັນຊີລາຍຮັບ - ລາຍຈ່າຍ (ຄົ້ນຫາວັນທີຍ້ອນຫຼັງ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Phetsarath&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Phetsarath', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bottom-sheet { transition: transform 0.3s ease-in-out; transform: translateY(100%); }
        .bottom-sheet.open { transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <div class="bg-white shadow-sm p-4 sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">📊 ບັນຊີຂອງຂ້ອຍ</h1>
        <div class="flex gap-2">
            <button onclick="exportData()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-xl text-xs font-bold transition">💾 Backup</button>
            <label class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-xl text-xs font-bold transition cursor-pointer">
                📥 Import
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
            </label>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-md">
            <p class="text-white/80 text-xs font-medium mb-1">ຍອດເຫຼືອຄົງເຫຼືອທັງໝົດ</p>
            <p id="total-balance" class="text-3xl font-bold mb-4">0 ກີບ</p>
            
            <div class="grid grid-cols-2 gap-2 pt-3 border-t border-white/20">
                <div>
                    <p class="text-white/70 text-[11px]">📈 ລາຍຮັບ (ຊ່ວງນີ້)</p>
                    <p id="total-income" class="text-base font-bold text-green-300">0 ກີບ</p>
                </div>
                <div class="border-l border-white/20 pl-3">
                    <p class="text-white/70 text-[11px]">📉 ລາຍຈ່າຍ (ຊ່ວງນີ້)</p>
                    <p id="total-expense" class="text-base font-bold text-red-300">0 ກີບ</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm space-y-2">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-gray-500">🔍 ຕົວຕອງຂໍ້ມູນ</span>
                <button id="clear-date-btn" onclick="clearDateFilter()" class="text-[11px] text-red-500 font-bold hidden">❌ ລ້າງຄ່າວັນທີ</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <select id="filter-time" onchange="handleTimeFilterChange()" class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50 text-xs font-bold text-gray-700 outline-none">
                        <option value="all">🌍 ສະແດງທັງໝົດ</option>
                        <option value="today">📅 ມື້ນີ້</option>
                        <option value="week">🗓️ ອາທິດນີ້</option>
                        <option value="month">📆 ເດືອນນີ້</option>
                        <option value="year">⏳ ປີນີ້</option>
                    </select>
                </div>
                <div>
                    <input type="date" id="filter-specific-date" onchange="handleSpecificDateChange()" class="w-full p-2 border border-gray-200 rounded-xl bg-gray-50 text-xs font-bold text-gray-700 outline-none">
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center pt-2">
            <h2 id="history-title" class="text-md font-bold text-gray-800">📜 ປະຫວັດລາຍການ</h2>
        </div>

        <div id="list" class="space-y-2.5"></div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent z-10 flex justify-center">
        <button onclick="toggleBottomSheet(true)" class="w-full max-w-md bg-blue-600 hover:bg-blue-700 text-white p-3.5 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 transition active:scale-95">
            ✨ ➕ ເພີ່ມລາຍການໃໝ່
        </button>
    </div>

    <div id="backdrop" onclick="toggleBottomSheet(false)" class="fixed inset-0 bg-black/40 z-20 hidden opacity-0 transition-opacity duration-300"></div>

    <div id="bottom-sheet" class="bottom-sheet fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl p-6 z-30 pb-8 border-t">
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-5"></div>
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-800">➕ ບັນທຶກລາຍການໃໝ່</h3>
            <button onclick="toggleBottomSheet(false)" class="text-gray-400 hover:text-gray-600 text-xl font-bold px-2">✕</button>
        </div>

        <form id="transaction-form" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-medium">ວັນທີ</label>
                <input type="date" id="date" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none text-sm" required>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-medium">ຊື່ລາຍການ</label>
                <input type="text" id="text" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none text-sm" placeholder="ເຊັ່ນ: ຄ່າອາຫານ, ເງິນເດືອນ" required>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-medium">ຈຳນວນເງິນ (ກີບ)</label>
                <input type="number" id="amount" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none text-sm font-bold text-blue-600" placeholder="0" required>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 font-medium">ປະເພດ</label>
                <select id="type" class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 outline-none text-sm font-medium">
                    <option value="income">📈 ລາຍຮັບ</option>
                    <option value="expense">📉 ລາຍຈ່າຍ</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 shadow-md transition active:scale-95 mt-2">
                💾 ບັນທຶກລາຍການ
            </button>
        </form>
    </div>

    <script>
        const balance = document.getElementById('total-balance');
        const income = document.getElementById('total-income');
        const expense = document.getElementById('total-expense');
        const list = document.getElementById('list');
        const form = document.getElementById('transaction-form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');
        const type = document.getElementById('type');
        const dateInput = document.getElementById('date');
        const filterTime = document.getElementById('filter-time');
        const filterSpecificDate = document.getElementById('filter-specific-date');
        const clearDateBtn = document.getElementById('clear-date-btn');
        const historyTitle = document.getElementById('history-title');
        const bottomSheet = document.getElementById('bottom-sheet');
        const backdrop = document.getElementById('backdrop');

        dateInput.value = new Date().toISOString().slice(0, 10);
        let transactions = JSON.parse(localStorage.getItem('my_expenses_v2')) || [];

        function toggleBottomSheet(open) {
            if (open) {
                backdrop.classList.remove('hidden');
                setTimeout(() => {
                    backdrop.classList.add('opacity-100');
                    bottomSheet.classList.add('open');
                }, 10);
            } else {
                bottomSheet.classList.remove('open');
                backdrop.classList.remove('opacity-100');
                setTimeout(() => backdrop.classList.add('hidden'), 30);
            }
        }

        // ເມື່ອມີການເລືອກວັນທີເຈາະຈົງ
        function handleSpecificDateChange() {
            if (filterSpecificDate.value) {
                filterTime.disabled = true; // ປິດການໃຊ້ງານຕົວຕອງຫຼັກຊົ່ວຄາວ
                filterTime.classList.add('opacity-50');
                clearDateBtn.classList.remove('hidden');
                
                // ປ່ຽນຫົວຂໍ້ປະຫວັດໃຫ້ສະແດງວັນທີທີ່ເລືອກ
                const formatted = new Date(filterSpecificDate.value).toLocaleDateString('lo-LA', {day: 'numeric', month: 'short', year: 'numeric'});
                historyTitle.innerText = `📅 ປະຫວັດຂອງວັນທີ: ${formatted}`;
            }
            init();
        }

        // ເມື່ອມີການກົດລ້າງຄ່າການເລືອກວັນທີ
        function clearDateFilter() {
            filterSpecificDate.value = '';
            filterTime.disabled = false;
            filterTime.classList.remove('opacity-50');
            clearDateBtn.classList.add('hidden');
            historyTitle.innerText = `📜 ປະຫວັດລາຍການ`;
            init();
        }

        // ເມື່ອປ່ຽນຕົວຕອງຊ່ວງເວລາ (Dropdown ຫຼັກ)
        function handleTimeFilterChange() {
            clearDateFilter();
        }

        function addTransaction(e) {
            e.preventDefault();
            const transaction = {
                id: Date.now(),
                date: dateInput.value,
                text: text.value,
                amount: parseFloat(amount.value),
                type: type.value
            };
            transactions.push(transaction);
            updateLocalStorage();
            init();
            text.value = '';
            amount.value = '';
            toggleBottomSheet(false);
        }

        function addTransactionDOM(transaction) {
            const isIncome = transaction.type === 'income';
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center";
            
            const formattedDate = new Date(transaction.date).toLocaleDateString('lo-LA', {day: 'numeric', month: 'short'});

            card.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="text-[11px] font-bold text-gray-400 bg-gray-50 px-2 py-1.5 rounded-lg text-center min-w-[45px]">
                        ${formattedDate}
                    </div>
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${transaction.text}</p>
                        <p class="text-[10px] text-gray-400">${transaction.type === 'income' ? '📈 ລາຍຮັບ' : '📉 ລາຍຈ່າຍ'}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-extrabold text-sm ${isIncome ? 'text-green-600' : 'text-red-500'}">
                        ${isIncome ? '+' : '-'}${transaction.amount.toLocaleString()}
                    </span>
                    <button onclick="removeTransaction(${transaction.id})" class="text-gray-300 hover:text-red-500 p-1 transition">
                        ✕
                    </button>
                </div>
            `;
            list.appendChild(card);
        }

        function getFilteredTransactions() {
            const now = new Date();
            const todayStr = now.toISOString().slice(0, 10);

            // 1. ຖ້າມີການເລືອກວັນທີເຈາະຈົງ (Specific Date Picker)
            if (filterSpecificDate.value) {
                return transactions.filter(t => t.date === filterSpecificDate.value);
            }

            // 2. ຖ້າບໍ່ມີ ກໍໃຫ້ຕອງຕາມ Dropdown ປົກກະຕິ
            return transactions.filter(t => {
                const tDate = new Date(t.date);
                if (filterTime.value === 'today') return t.date === todayStr;
                if (filterTime.value === 'week') {
                    const currentDay = now.getDay();
                    const distanceToMonday = currentDay === 0 ? 6 : currentDay - 1;
                    const monday = new Date(now);
                    monday.setDate(now.getDate() - distanceToMonday);
                    monday.setHours(0,0,0,0);
                    return tDate >= monday && tDate <= now;
                }
                if (filterTime.value === 'month') return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
                if (filterTime.value === 'year') return tDate.getFullYear() === now.getFullYear();
                return true;
            });
        }

        function updateValues(filteredData) {
            const totalIncome = filteredData.filter(t => t.type === 'income').reduce((acc, item) => acc + item.amount, 0);
            const totalExpense = filteredData.filter(t => t.type === 'expense').reduce((acc, item) => acc + item.amount, 0);
            
            // ຄຳນວນຍອດເຫຼືອຄົງເຫຼືອທັງໝົດ (ເອົາທັງໝົດທີ່ມີໃນລະບົບມາຫັກກັນ ເພື່ອໃຫ້ຮູ້ຍອດເງິນແທ້ໃນກະເປົ໋າ)
            const allIncome = transactions.filter(t => t.type === 'income').reduce((acc, item) => acc + item.amount, 0);
            const allExpense = transactions.filter(t => t.type === 'expense').reduce((acc, item) => acc + item.amount, 0);
            const totalBalance = allIncome - allExpense;

            balance.innerText = `${totalBalance.toLocaleString()} ກີບ`;
            income.innerText = `${totalIncome.toLocaleString()} ກີບ`;
            expense.innerText = `${totalExpense.toLocaleString()} ກີບ`;
        }

        function removeTransaction(id) {
            if(confirm('ຕ້ອງການລຶບລາຍການນີ້ແທ້ຫຼືບໍ່?')) {
                transactions = transactions.filter(t => t.id !== id);
                updateLocalStorage();
                init();
            }
        }

        function updateLocalStorage() {
            localStorage.setItem('my_expenses_v2', JSON.stringify(transactions));
        }

        function exportData() {
            if(transactions.length === 0) return alert('ບໍ່ມີຂໍ້ມູນໃຫ້ Backup');
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `backup_finance_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        document.getElementById('import-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        transactions = importedData;
                        updateLocalStorage();
                        clearDateFilter();
                        alert('ນຳເຂົ້າຂໍ້ມູນສຳເລັດແລ້ວ!');
                    }
                } catch (err) { alert('ບໍ່ສາມາດອ່ານໄຟລ໌ໄດ້'); }
            };
            reader.readAsText(file);
        });

        function init() {
            list.innerHTML = '';
            const filteredData = getFilteredTransactions();
            filteredData.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if(filteredData.length === 0) {
                list.innerHTML = `<p class="text-center text-xs text-gray-400 py-8">📭 ບໍ່ມີລາຍການໃນຊ່ວງເວລານີ້</p>`;
            } else {
                filteredData.forEach(addTransactionDOM);
            }
            updateValues(filteredData);
        }

        init();
        form.addEventListener('submit', addTransaction);
    </script>
</body>
</html>
